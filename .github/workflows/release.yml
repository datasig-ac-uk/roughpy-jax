name: release

on:
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build_sdist:
    name: Build sdist
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Build sdist
        run: uv build --sdist

      - uses: actions/upload-artifact@v4
        with:
          name: dist-sdist
          path: dist/*.tar.gz
          if-no-files-found: error

  build_wheels:
    name: Build wheels (${{ matrix.os }}${{ matrix.arch_name && format(', {0}', matrix.arch_name) || '' }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            arch_name: x86_64
          - os: windows-latest
            arch_name: AMD64
          - os: macos-14
            arch_name: arm64

    steps:
      - uses: actions/checkout@v5

      - uses: pypa/cibuildwheel@v3.2.1
        env:
          CIBW_ARCHS_LINUX: auto64
          CIBW_ARCHS_WINDOWS: auto64
          CIBW_ARCHS_MACOS: native

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}-${{ matrix.arch_name }}
          path: wheelhouse/*.whl
          if-no-files-found: error

  publish_release:
    name: Publish release
    runs-on: ubuntu-latest
    needs:
      - build_sdist
      - build_wheels
    permissions:
      contents: write
      id-token: write
    environment:
      name: pypi

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: dist-*
          merge-multiple: true

      - uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: wheels-*
          merge-multiple: true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Check distributions
        run: uv run --with twine twine check dist/*

      - name: Derive release version
        id: release_version
        run: |
          wheel="$(find dist -maxdepth 1 -type f -name 'roughpy_jax-*.whl' | sort | head -n 1)"
          if [ -z "${wheel}" ]; then
            echo "No roughpy_jax wheel found in dist/" >&2
            exit 1
          fi

          version="$(printf '%s\n' "$(basename "${wheel}")" | cut -d- -f2)"
          printf 'tag=v%s\n' "${version}" >> "${GITHUB_OUTPUT}"

      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.release_version.outputs.tag }}
        run: gh release create "${RELEASE_TAG}" dist/* --generate-notes --target "${GITHUB_SHA}" --title "${RELEASE_TAG}"
